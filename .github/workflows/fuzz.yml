name: Fuzz

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [FuzzRoundTrip, FuzzUnmarshal, FuzzValidMatchesDecode, FuzzDecoderStream]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-${{ matrix.target }}-
      - name: Fuzz (15m)
        run: go test -run '^$' -fuzz "^${{ matrix.target }}$" -fuzztime=15m .
      - name: Upload reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-reproducers-${{ matrix.target }}
          path: testdata/fuzz/
          if-no-files-found: ignore
